### model
model_name_or_path: Video-R1/Video-R1-7B
cache_dir: /scratch/indrisch/huggingface/hub
image_max_pixels: 65536
video_max_pixels: 16384
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all

### dataset; https://llamafactory.readthedocs.io/en/latest/advanced/arguments.html#id4
dataset: Scene30k
template: videor1
cutoff_len: 131072 # max len of the model
overwrite_cache: true
preprocessing_num_workers: 32
dataloader_num_workers: 4
low_cpu_mem_usage: true

### output
output_dir: saves/videor1/lora/sft/Scene30k_traineval
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

# debugging level
debug: underflow_overflow
log_level: debug
log_level_replica: debug
print_param_status: true

# acceleration
flash_attn: fa2
enable_liger_kernel: true

# distribution
deepspeed: examples/deepspeed/ds_z2_offload_config.json

## eval
val_size: 0.1
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 500
